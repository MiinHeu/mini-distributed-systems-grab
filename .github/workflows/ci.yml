name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: rideshare_admin
      POSTGRES_PASSWORD: Admin@123456
      POSTGRES_DB: rideshare_db
      DB_NORTH_PRIMARY_HOST: localhost
      DB_NORTH_PRIMARY_PORT: "5432"
      DB_NORTH_REPLICA_HOST: localhost
      DB_NORTH_REPLICA_PORT: "5433"
      DB_SOUTH_PRIMARY_HOST: localhost
      DB_SOUTH_PRIMARY_PORT: "5434"
      DB_SOUTH_REPLICA_HOST: localhost
      DB_SOUTH_REPLICA_PORT: "5435"
      PORT: "3000"
      NODE_ENV: "test"
      JWT_SECRET: "test_secret"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Project
        run: npm run build
